<!DOCTYPE html>
<html>
<head><title>Créer icône</title></head>
<body>
  <canvas id="canvas128" width="128" height="128"></canvas>
  <canvas id="canvas48" width="48" height="48"></canvas>
  <canvas id="canvas16" width="16" height="16"></canvas>
  <br><br>
  <button onclick="download()">Télécharger les icônes</button>

  <script>
    function drawIcon(canvas) {
      const ctx = canvas.getContext('2d');
      const s = canvas.width;

      // Fond violet
      ctx.fillStyle = '#7c3aed';
      roundRect(ctx, 0, 0, s, s, s * 0.2);
      ctx.fill();

      // Lettre U
      ctx.fillStyle = 'white';
      ctx.font = `bold ${s * 0.55}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('U', s / 2, s / 2);

      // Petit éclair en bas à droite
      ctx.fillStyle = '#fbbf24';
      ctx.font = `bold ${s * 0.28}px Arial`;
      ctx.fillText('✨', s * 0.72, s * 0.72);
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    drawIcon(document.getElementById('canvas128'));
    drawIcon(document.getElementById('canvas48'));
    drawIcon(document.getElementById('canvas16'));

    function download() {
      ['128', '48', '16'].forEach(size => {
        const canvas = document.getElementById(`canvas${size}`);
        const link = document.createElement('a');
        link.download = `icon${size}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }
  </script>
</body>
</html>
